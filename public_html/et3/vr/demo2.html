<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <a-entity camera look-controls wasd-controls postion="0 2 1">
        <a-entity cursor="fuse: true; fuseTimeout: 500"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: black; shader: flat">
        </a-entity>
      </a-entity>

      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      
      <a-sky color="#ECECEC"></a-sky>

      <a-gltf-model cursor-listener id="object" src="models/logo.gltf" scale="5 5 5" position="-0.67304 0.5 -3.6" rotation="0 -360 0" gltf-model="models/logo.gltf"></a-gltf-model>
      <a-obj-model cursor-listener src="models/3DLogo.obj" scale="0.1 0.1 0.1" position="0 0 -3.91229"></a-obj-model>
    </a-scene>

    <script>

      let mySound1 = false
      let lookedAtOnce = false;
      // Component to change to a sequential color on click.
      AFRAME.registerComponent('cursor-listener', {
      init: function () {
        var lastIndex = -1;
        var COLORS = ['red', 'green', 'blue'];
        this.el.addEventListener('click', function (evt) {
        lastIndex = (lastIndex + 1) % COLORS.length;
        this.setAttribute('material', 'color', COLORS[lastIndex]);
        console.log('I was clicked at: ', evt.detail.intersection.point);

        if(this.getAttribute("id") == "object") {
         
          if(!lookedAtOnce){
            alert("hooray"); 
            lookedAtOnce = true; 
            mySound1.play();
            }
          else
            this.setAttribute("animation", "dur: 3000; property: position; to: 2 5 4");
            this.setAttribute("animation", "rotation: 360 90 60; property: position; to: 2 5 4")
          }
    });

  }
});
    </script>
  </body>
</html>
