<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene keyboard-shortcuts="" screenshot="" xr-mode-ui="" device-orientation-permission-ui="">

      <a-entity camera look-controls position="0 -0.5 1" rotation="0 0 0">
        <a-entity cursor="fuse: true; fuseTimeout: 500"
          position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: black; shader: flat">
        </a-entity>
      </a-entity>
            
      <a-plane position="1.77 0.106 -13.8" rotation="-85.95 2.6500000000000004 68.28" width="4" height="4" color="#7BC8A4" material="blending: additive; color: #a27c92" scale="10.47 0.8 1.72"></a-plane>
      <a-assets>
          <img id="sky" src="img/galaxy.jpg">
        </a-assets>
        
        <a-sky src="#sky" scale="0.3 0.5 0.3" position="0.3181 60 -0.23" material="shader: phong; color: #808080; specular: #000000"></a-sky>


        <a-gltf-model cursor-listener="" id="object" src="models/train2.gltf" position="-0.69497 -0.46 -6.77912" rotation="3.57 -19.59 0" gltf-model="models/train2.gltf" scale="0.7 0.7 0.7"></a-gltf-model>

        <a-entity light="intensity: 3.274; castShadow: true" position="0.06428 1.08061 1" data-aframe-default-light="" aframe-injected=""></a-entity>

        <a-sound src="#dreamySound" autoplay="true" loop="true" volume="0.4" position="0 2 0" sound="src: ./audio/dreamy_sound.mp3" id="dreamySound"></a-sound>    
        <a-assets>
            <audio id="dreamySound" src="./audio/dreamy_sound.mp3"></audio>
        </a-assets>
    
        
    </a-scene>

    <script>

      let lookedAtOnce = false;
      // Component to change to a sequential color on click.
      AFRAME.registerComponent('cursor-listener', {
      init: function () {
        var lastIndex = -1;
        var COLORS = ['red', 'green', 'blue'];
        this.el.addEventListener('click', function (evt) {
        lastIndex = (lastIndex + 1) % COLORS.length;
        this.setAttribute('material', 'color', COLORS[lastIndex]);
        console.log('I was clicked at: ', evt.detail.intersection.point);

        if(this.getAttribute("id") == "object") {
         
          if(!lookedAtOnce){
            alert("Next Stop"); 
            lookedAtOnce = true; 
            }
          else
          this.setAttribute("animation",
  "property: position; to: -11.205 -1.5 22.580; dur: 10000; easing: linear");

          }
    });

  }
});
    </script>
    
  </body>
</html>
